  /* ============================================================
     MOBILE LAYOUT (phone / narrow screens)
     ============================================================
     Below this width the desktop metaphor (floating draggable
     windows + bottom taskbar) is swapped for a simple two-pane
     layout: a fixed icon "rail" on the left, and a single content
     pane on the right. Single-tapping an icon loads that app's
     window directly into the right pane instead of opening a
     floating window. There is no taskbar to collapse into, so
     minimize/maximize simply have no visible effect here.
     ============================================================ */
  @media (max-width: 768px) {

    #desktop {
      display: flex;
      flex-direction: row;
      background-image: none;
    }

    /* Left icon rail */
    #icon-column {
      position: static;
      flex: 0 0 108px;
      width: 108px;
      height: 100%;
      top: auto;
      left: auto;
      margin: 0;
      padding: 18px 6px;
      box-sizing: border-box;
      gap: 26px;
      overflow-y: auto;
      background-image: url('bliss.png');
      background-size: cover;
      background-position: center bottom;
      background-color: #3a6ea5;
      z-index: 2;
    }

    .desktop-icon {
      width: 100%;
    }

    /* Desktop-only chrome that has no place on mobile */
    #taskbar,
    #start-menu {
      display: none !important;
    }

    /* Right content pane */
    #windows-container {
      position: relative;
      flex: 1 1 auto;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    #mobile-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #8a97a8;
      font-size: 13px;
      text-align: center;
      padding: 0 24px;
      z-index: 0;
    }

    #mobile-placeholder .mp-placeholder-text {
      font-family: Tahoma, Verdana, Arial, sans-serif;
    }

    /* Windows fill the whole right pane instead of floating */
    .xp-window {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      min-width: 0;
      min-height: 0;
      border: none;
      border-radius: 0;
      box-shadow: none;
      z-index: 1;
    }

    /* No drag-resize affordance on mobile */
    .xp-window .resize-handle {
      display: none;
    }

    /* Minimize / maximize have nothing to do on mobile (no taskbar
       to collapse into, window already fills the pane) — keep them
       visible for visual parity but signal they're inactive. */
    .xp-window .btn-min,
    .xp-window .btn-max {
      opacity: 0.55;
    }

    /* ==========================================================
       MUSIC PLAYER — mobile-only layout fix
       Controls row (play/prev/next, seek slider, time, loop) and
       the volume row were overflowing off the right edge on small
       screens. Let them wrap instead of forcing everything into
       one line.
       ========================================================== */
    .mp-controls {
      flex-wrap: wrap;

      flex: 1;
      min-width: 120px;
      /* Drop the slider onto its own full-width row so the
         buttons, time, and loop control aren't squeezed out. */
      order: 1;
      flex-basis: 100%;
    }

      order: 2;
      flex-shrink: 0;
    }

    .mp-btn.mp-loop-btn {

    }

    .mp-volume-row {

      gap: 8px;
    }

<script>
/* =====================================================================
   EDIT HERE TO CHANGE AN APP
   =====================================================================
   This is the ONLY section you need to touch to change your bio content.

   Each entry in the APPS array below is one desktop icon + one window.
   You can safely:
     - change "name"      -> the label under the icon AND the window title
     - change "icon"      -> the image URL used for the icon
     - change "content"   -> the text shown inside the window (HTML allowed)
     - change "width/height" -> starting size of the window
     - change "x / y"     -> starting position of the icon

   To ADD a brand new app/icon, just copy one whole { ... } block below,
   paste it as a new entry, and edit its values. Make sure each app has
   a unique "id" (no spaces, e.g. "hobbies" or "contactMe").
   ===================================================================== */

const APPS = [
  {
    id: "aboutMe",
    name: "About Me",
    icon: "https://win98icons.alexmeub.com/icons/png/notepad-2.png",
    width: 650,
    height: 500,
     content: `<b>Introduction</b>

NAME: Anzar Sharif

Hello. I am an undergraduate Economics student at a private university in Dhaka. 

My academic interests include economics, mathematics, and finance. I want to pursue academic research in the field of economics and finance.

I was raised in the United States and moved to Bangladesh circa. 2019. My life has been largely shaped by culture shock and the experience of living in two very different countries. It has humbled me tremendously.

I love music. I am currently learning piano, and I have been writing songs in my bedroom for over 2 years now. 

I aspire to connect with people through my music. Thank you for stopping by, feel free to play around with the features on this little website.`

const iconColumn = document.getElementById('icon-column');
const windowsContainer = document.getElementById('windows-container');
const taskbarTasks = document.getElementById('taskbar-tasks');
const startMenuItems = document.getElementById('start-menu-items');

let zIndexCounter = 10;

// Tracks whether each app's window is currently minimized
const winStates = {};

// True when the phone/mobile layout (media query below 768px) is active.
// Below this width, single-tapping an icon loads its window straight
// into the right-hand pane instead of opening a floating window.
function isMobileMode() {
  return window.matchMedia('(max-width: 768px)').matches;
}

// ---- Build desktop icons, windows, and start menu items from APPS ----
APPS.forEach((app, index) => {

  // Desktop icon
  const iconEl = document.createElement('div');
  iconEl.className = 'desktop-icon';
  iconEl.dataset.appId = app.id;
  iconEl.innerHTML = `
    <img src="${app.icon}" alt="${app.name}">
    <div class="icon-label">${app.name}</div>
  `;
  iconColumn.appendChild(iconEl);

  // Single click = select icon, Double click = open window (desktop).
  // On mobile there is no double-click — a single tap both selects
  // the icon AND loads its window into the right-hand pane.
  iconEl.addEventListener('click', () => {
    document.querySelectorAll('.desktop-icon').forEach(el => el.classList.remove('selected'));
    iconEl.classList.add('selected');
    if (isMobileMode()) {
      openWindow(app.id);
    }
  });
  iconEl.addEventListener('dblclick', () => {
    if (!isMobileMode()) openWindow(app.id);
  });

  // Touch support for the desktop layout: two taps quickly = open
  // (basic double-tap detection). Not needed on mobile, where a
  // single tap already opens the app via the click handler above.
  let lastTap = 0;
  iconEl.addEventListener('touchend', (e) => {
    if (isMobileMode()) return;
    const now = Date.now();
    if (now - lastTap < 400) {
      openWindow(app.id);
    }
    lastTap = now;
  });

  // Window
  const winEl = document.createElement('div');
  winEl.className = 'xp-window';
  winEl.id = 'window-' + app.id;
  winEl.style.width = app.width + 'px';
  winEl.style.height = app.height + 'px';
  winEl.style.top = (60 + index * 30) + 'px';
  winEl.style.left = (140 + index * 40) + 'px';

  winEl.innerHTML = `
    <div class="xp-titlebar">
      <div class="title-left">
        <img src="${app.icon}" alt="">
        <span>${app.name}</span>
      </div>
      <div class="window-controls">
        <div class="win-btn btn-min" title="Minimize">_</div>
        <div class="win-btn btn-max" title="Maximize">&#9633;</div>
        <div class="win-btn btn-close" title="Close">&times;</div>
      </div>
    </div>
    ${app.type === 'player' ? buildMediaPlayerHTML() : `
    <div class="notepad-menubar">
      <span>File</span><span>Edit</span><span>Format</span><span>View</span><span>Help</span>
    </div>
    <div class="xp-window-body">${app.content}</div>
    `}
    <div class="resize-handle"></div>
  `;
  windowsContainer.appendChild(winEl);
  winStates[app.id] = { minimized: false };

  if (app.type === 'player') {
    setupMediaPlayer(winEl);
  }

  // Start menu item
  const menuItem = document.createElement('div');
  menuItem.className = 'start-menu-item';
  menuItem.innerHTML = `<img src="${app.icon}" alt=""><span>${app.name}</span>`;
  menuItem.addEventListener('click', () => {
    openWindow(app.id);
    toggleStartMenu(false);
  });
  startMenuItems.appendChild(menuItem);

  // Wire up window behavior
  setupWindow(winEl, app);
});

// instead of the empty placeholder.
if (isMobileMode()) {
  const defaultIcon = document.querySelector('.desktop-icon[data-app-id="aboutMe"]');
  if (defaultIcon) defaultIcon.classList.add('selected');
  openWindow('aboutMe');

// ---- Open / close / focus logic ----
function openWindow(appId) {
  const winEl = document.getElementById('window-' + appId);
  if (!winEl) return;
  winEl.classList.add('open');
  winEl.style.transition = 'none';
  winEl.style.transform = 'translate(0,0) scale(1)';
  winEl.style.opacity = '1';
  winStates[appId].minimized = false;
  bringToFront(winEl);
  // On mobile there's no taskbar to register with — the window
  // simply fills the right-hand pane. Skipping this also means
  // close/minimize won't try to animate into a (hidden) taskbar
  // button, so windows just close/open instantly on mobile.
  if (!isMobileMode()) {
    addTaskbarEntry(appId);
  }
}

function closeWindow(appId) {
  const winEl = document.getElementById('window-' + appId);
  if (!winEl) return;
  const taskEl = document.getElementById('task-window-' + appId);

  // Closing a window also deselects its icon (applies on both
  // desktop and mobile).
  const iconEl = document.querySelector(`.desktop-icon[data-app-id="${appId}"]`);
  if (iconEl) iconEl.classList.remove('selected');


  // If this window contains a media player, stop any audio playback
  // (closing should fully stop the music; minimizing should not).
  const audioEl = winEl.querySelector('#mp-audio');
  if (audioEl) {
    audioEl.pause();
    audioEl.currentTime = 0;
  }

  // If there's a taskbar entry to collapse into, animate the shrink;
  // otherwise just close instantly (shouldn't normally happen).
  if (taskEl) {
    const winRect = winEl.getBoundingClientRect();
    const taskRect = taskEl.getBoundingClientRect();
    const dx = (taskRect.left + taskRect.width / 2) - (winRect.left + winRect.width / 2);
    const dy = (taskRect.top + taskRect.height / 2) - (winRect.top + winRect.height / 2);

    winEl.style.transition = 'transform 0.28s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.28s ease-in';
    winEl.style.transform = `translate(${dx}px, ${dy}px) scale(0.05)`;
    winEl.style.opacity = '0';

    winStates[appId].minimized = false;
    taskEl.classList.remove('active');

    setTimeout(() => {
      winEl.classList.remove('open');
      // Reset transform/opacity so the window opens normally next time
      winEl.style.transition = 'none';
      winEl.style.transform = 'translate(0,0) scale(1)';
      winEl.style.opacity = '1';
      removeTaskbarEntry(appId);
    }, 280);
  } else {
    winEl.classList.remove('open');
    winStates[appId].minimized = false;
    removeTaskbarEntry(appId);
  }
}

function bringToFront(winEl) {
  zIndexCounter++;
  winEl.style.zIndex = zIndexCounter;
  document.querySelectorAll('.taskbar-task').forEach(t => t.classList.remove('active'));
  const task = document.getElementById('task-' + winEl.id);
  if (task) task.classList.add('active');
}

// ---- Genie-style minimize / restore animation ----
// Shrinks the window down into its taskbar button (minimize) or
// grows it back out from the taskbar button (restore).
function minimizeWindow(appId) {
  const winEl = document.getElementById('window-' + appId);
  const taskEl = document.getElementById('task-window-' + appId);
  if (!winEl || !taskEl) return;

  const winRect = winEl.getBoundingClientRect();
  const taskRect = taskEl.getBoundingClientRect();
  const dx = (taskRect.left + taskRect.width / 2) - (winRect.left + winRect.width / 2);
  const dy = (taskRect.top + taskRect.height / 2) - (winRect.top + winRect.height / 2);

  winEl.style.transition = 'transform 0.28s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.28s ease-in';
  winEl.style.transform = `translate(${dx}px, ${dy}px) scale(0.05)`;
  winEl.style.opacity = '0';

  winStates[appId].minimized = true;
  taskEl.classList.remove('active');

  setTimeout(() => {
    // Only actually hide it if it's still meant to be minimized
    // (in case the user clicked restore again very quickly)
    if (winStates[appId].minimized) {
      winEl.classList.remove('open');
    }
  }, 280);
}

function restoreWindow(appId) {
  const winEl = document.getElementById('window-' + appId);
  const taskEl = document.getElementById('task-window-' + appId);
  if (!winEl || !taskEl) return;

  winStates[appId].minimized = false;
  winEl.classList.add('open');

  // Snap instantly to the "shrunk into taskbar" position with no transition...
  const taskRect = taskEl.getBoundingClientRect();
  const winRect = winEl.getBoundingClientRect();
  const dx = (taskRect.left + taskRect.width / 2) - (winRect.left + winRect.width / 2);
  const dy = (taskRect.top + taskRect.height / 2) - (winRect.top + winRect.height / 2);

  winEl.style.transition = 'none';
  winEl.style.transform = `translate(${dx}px, ${dy}px) scale(0.05)`;
  winEl.style.opacity = '0';

  // ...force the browser to apply that instantly...
  void winEl.offsetWidth;

  // ...then animate back to full size and normal position.
  winEl.style.transition = 'transform 0.28s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.28s ease-out';
  winEl.style.transform = 'translate(0, 0) scale(1)';
  winEl.style.opacity = '1';

  bringToFront(winEl);
}

// ---- Taskbar entries for open windows ----
function addTaskbarEntry(appId) {
  const existing = document.getElementById('task-window-' + appId);
  if (existing) return; // already there
  const app = APPS.find(a => a.id === appId);

  const taskEl = document.createElement('div');
  taskEl.className = 'taskbar-task active';
  taskEl.id = 'task-window-' + appId;
  taskEl.innerHTML = `<img src="${app.icon}" alt=""><span>${app.name}</span>`;
  taskEl.addEventListener('click', () => {
    const winEl = document.getElementById('window-' + appId);
    if (winStates[appId].minimized) {
      restoreWindow(appId);
    } else if (parseInt(winEl.style.zIndex, 10) === zIndexCounter) {
      // Clicking the taskbar button of the already-active window minimizes it
      minimizeWindow(appId);
    } else {
      bringToFront(winEl);
    }
  });
  taskbarTasks.appendChild(taskEl);
}

function removeTaskbarEntry(appId) {
  const taskEl = document.getElementById('task-window-' + appId);
  if (taskEl) taskEl.remove();
}

// ---- Window setup: dragging, buttons, resizing ----
function setupWindow(winEl, app) {
  const titlebar = winEl.querySelector('.xp-titlebar');
  const closeBtn = winEl.querySelector('.btn-close');
  const minBtn = winEl.querySelector('.btn-min');
  const maxBtn = winEl.querySelector('.btn-max');
  const resizeHandle = winEl.querySelector('.resize-handle');

  // Bring to front on any click inside window
  winEl.addEventListener('mousedown', () => bringToFront(winEl));
  winEl.addEventListener('touchstart', () => bringToFront(winEl));

  // Close button
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    closeWindow(app.id);
  });

  // Minimize button - animates the window shrinking into its taskbar entry
  minBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    minimizeWindow(app.id);
  });

  // Maximize / restore button
  let isMaximized = false;
  let prevStyle = {};
  maxBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!isMaximized) {
      prevStyle = {
        top: winEl.style.top,
        left: winEl.style.left,
        width: winEl.style.width,
        height: winEl.style.height
      };
      winEl.style.top = '0px';
      winEl.style.left = '0px';
      winEl.style.width = '100%';
      winEl.style.height = 'calc(100% - 40px)';
      isMaximized = true;
    } else {
      winEl.style.top = prevStyle.top;
      winEl.style.left = prevStyle.left;
      winEl.style.width = prevStyle.width;
      winEl.style.height = prevStyle.height;
      isMaximized = false;
    }
  });

  // ---- Dragging (mouse + touch) ----
  let isDragging = false;
  let dragOffsetX = 0;
  let dragOffsetY = 0;

  function startDrag(clientX, clientY) {
    isDragging = true;
    const rect = winEl.getBoundingClientRect();
    dragOffsetX = clientX - rect.left;
    dragOffsetY = clientY - rect.top;
    bringToFront(winEl);
  }

  function doDrag(clientX, clientY) {
    if (!isDragging) return;
    let newLeft = clientX - dragOffsetX;
    let newTop = clientY - dragOffsetY;
    // keep window from being dragged above the top of the screen
    if (newTop < 0) newTop = 0;
    winEl.style.left = newLeft + 'px';
    winEl.style.top = newTop + 'px';
    winEl.style.width = winEl.style.width; // no-op, keeps size stable
  }

  function endDrag() {
    isDragging = false;
  }

  titlebar.addEventListener('mousedown', (e) => {
    startDrag(e.clientX, e.clientY);
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => doDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup', endDrag);

  titlebar.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    startDrag(touch.clientX, touch.clientY);
  });
  document.addEventListener('touchmove', (e) => {
    if (isDragging && e.touches[0]) {
      doDrag(e.touches[0].clientX, e.touches[0].clientY);
    }
  });
  document.addEventListener('touchend', endDrag);

  // ---- Resizing (bottom-right corner) ----
  let isResizing = false;
  let startW = 0, startH = 0, startX = 0, startY = 0;

  resizeHandle.addEventListener('mousedown', (e) => {
    isResizing = true;
    startW = winEl.offsetWidth;
    startH = winEl.offsetHeight;
    startX = e.clientX;
    startY = e.clientY;
    e.stopPropagation();
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const newW = Math.max(280, startW + (e.clientX - startX));
    const newH = Math.max(180, startH + (e.clientY - startY));
    winEl.style.width = newW + 'px';
    winEl.style.height = newH + 'px';
  });

  document.addEventListener('mouseup', () => { isResizing = false; });
}

// Builds the HTML skeleton for the player: a "now playing" bar on top
// and a scrollable song gallery underneath.
function buildMediaPlayerHTML() {

              </svg>
            </span>
            <input type="range" class="mp-volume" id="mp-volume" min="0" max="100" value="70">

// Wires up the gallery list, the <audio> element, and all the controls
// for the media player window.
function setupMediaPlayer(winEl) {
  const gallery = winEl.querySelector('#mp-gallery');
  const audio = winEl.querySelector('#mp-audio');
  const playBtn = winEl.querySelector('#mp-play-btn');
  const prevBtn = winEl.querySelector('#mp-prev-btn');
  const nextBtn = winEl.querySelector('#mp-next-btn');
  const loopBtn = winEl.querySelector('#mp-loop-btn');
  const seek = winEl.querySelector('#mp-seek');
  const timeLabel = winEl.querySelector('#mp-time');
  const volume = winEl.querySelector('#mp-volume');
  const coverEl = winEl.querySelector('#mp-cover');
  const titleEl = winEl.querySelector('#mp-title');
  const artistEl = winEl.querySelector('#mp-artist');

  let currentIndex = -1;
  let isLooping = false;

  // Build the scrollable gallery of tracks from the TRACKS list up top
  TRACKS.forEach((track, i) => {
    const item = document.createElement('div');
    item.className = 'mp-track-item';
    item.dataset.index = i;
    item.innerHTML = `
      <div class="mp-track-icon">
        ${track.cover ? `<img src="${track.cover}" alt="">` : '&#9834;'}
      </div>
      <div class="mp-track-meta">
        <div class="mp-track-title">${track.title}</div>
        <div class="mp-track-artist">${track.artist}</div>
      </div>
      <div class="mp-track-date">
        <span class="mp-track-date-label">Date uploaded</span>
        <span class="mp-track-date-value">${track.dateUploaded || '--/--/----'}</span>
      </div>
    `;
    item.addEventListener('click', () => loadTrack(i, true));
    gallery.appendChild(item);
  });

  function formatTime(sec) {
    if (!isFinite(sec) || isNaN(sec)) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function loadTrack(index, autoPlay) {
    currentIndex = index;
    const track = TRACKS[index];

    // Highlight the selected row in the gallery
    gallery.querySelectorAll('.mp-track-item').forEach(el => el.classList.remove('active'));
    const activeEl = gallery.querySelector(`.mp-track-item[data-index="${index}"]`);
    if (activeEl) activeEl.classList.add('active');

    // Update the "now playing" panel
    titleEl.textContent = track.title;
    artistEl.textContent = track.artist;
    coverEl.innerHTML = track.cover ? `<img src="${track.cover}" alt="">` : '&#9834;';

    if (!track.src) {
      // No audio file has been added yet for this example track
      artistEl.textContent = track.artist + ' — no audio file added yet';
      playBtn.innerHTML = '&#9658;';
      seek.value = 0;
      timeLabel.textContent = '0:00 / 0:00';
      return;
    }

    audio.src = track.src;
    if (autoPlay) {
      audio.play().catch(() => {
        // Autoplay can be blocked by the browser; that's fine, the
        // play button still lets the user start it manually.
      });
    }
  }

  playBtn.addEventListener('click', () => {
    if (currentIndex === -1) return;
    if (!TRACKS[currentIndex].src) return;
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  });

  prevBtn.addEventListener('click', () => {
    if (currentIndex === -1) return;
    if (currentIndex > 0) {
      loadTrack(currentIndex - 1, true);
    } else {
      // Already on the first track — just restart it
      audio.currentTime = 0;
    }
  });

  nextBtn.addEventListener('click', () => {
    if (currentIndex === -1) return;
    if (currentIndex < TRACKS.length - 1) {
      loadTrack(currentIndex + 1, true);
    } else {
      // Already on the last track — just restart it
      audio.currentTime = 0;
    }
  });

  loopBtn.addEventListener('click', () => {
    isLooping = !isLooping;
    loopBtn.classList.toggle('active', isLooping);
  });

  audio.addEventListener('play', () => { playBtn.innerHTML = '&#10073;&#10073;'; });
  audio.addEventListener('pause', () => { playBtn.innerHTML = '&#9658;'; });

  audio.addEventListener('loadedmetadata', () => {
    seek.value = 0;
    timeLabel.textContent = `0:00 / ${formatTime(audio.duration)}`;
  });

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      seek.value = (audio.currentTime / audio.duration) * 100;
      timeLabel.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
    }
  });

  audio.addEventListener('ended', () => {
    if (isLooping) {
      // Repeat the current track
      audio.currentTime = 0;
      audio.play();
      return;
    }
    // Auto-advance to the next track in the list, if there is one
    if (currentIndex < TRACKS.length - 1) {
      loadTrack(currentIndex + 1, true);
    }
  });

  seek.addEventListener('input', () => {
    if (audio.duration) {
      audio.currentTime = (seek.value / 100) * audio.duration;
    }
  });

  volume.addEventListener('input', () => {
    audio.volume = volume.value / 100;
  });
  audio.volume = volume.value / 100;
}

// ---- Start menu toggle ----
const startButton = document.getElementById('start-button');
const startMenu = document.getElementById('start-menu');

function toggleStartMenu(forceState) {
  const shouldOpen = forceState !== undefined ? forceState : !startMenu.classList.contains('open');
  startMenu.classList.toggle('open', shouldOpen);
}

startButton.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleStartMenu();
});

document.addEventListener('click', (e) => {
  if (!startMenu.contains(e.target) && e.target !== startButton) {
    toggleStartMenu(false);
  }
});

// ---- Deselect icons when clicking empty desktop space ----
document.getElementById('desktop').addEventListener('click', (e) => {
  if (e.target.id === 'desktop') {
    document.querySelectorAll('.desktop-icon').forEach(el => el.classList.remove('selected'));
  }
});

// ---- Live clock in the system tray ----
function updateClock() {
  const now = new Date();
  let hours = now.getHours();
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  if (hours === 0) hours = 12;
  document.getElementById('clock').textContent = `${hours}:${minutes} ${ampm}`;
}
updateClock();
setInterval(updateClock, 1000 * 10);

</script>
